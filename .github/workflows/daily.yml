name: Daily FX Signal Update

on:
  schedule:
    - cron: '30 22 * * *'  # UTC 22:30 = JST 07:30 every day
  workflow_dispatch:        # 手動実行ボタン

permissions:
  contents: write           # コミット権限

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Generate daily signals
        env:
          FX_ACCOUNT_BALANCE: ${{ vars.FX_ACCOUNT_BALANCE || '100000' }}
          FX_RISK_PCT: ${{ vars.FX_RISK_PCT || '0.02' }}
          FX_MAX_LEVERAGE: ${{ vars.FX_MAX_LEVERAGE || '20' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          cd "${{ github.workspace }}"
          python src/generate_daily.py

      - name: Commit and push updated dashboard
        run: |
          cd "${{ github.workspace }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/index.html output/workflow.html output/daily_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily signal $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set, skipping"
          else
            echo "Pinging Render deploy hook..."
            curl -fsS -X POST "$HOOK" || echo "Deploy hook ping failed (non-fatal)"
          fi
